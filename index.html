<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>ATIC | OS – Pega Amostra</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    :root {
      --bg: #f5f7fb;
      --accent: #4f46e5; 
      --radius-lg: 16px;
    }
    body { background: radial-gradient(circle at top left, #eef2ff, #f9fafb); min-height: 100vh; }
    .glass-card {
        background: rgba(255, 255, 255, 0.85);
        backdrop-filter: blur(18px);
        border-radius: var(--radius-lg);
        box-shadow: 0 18px 45px rgba(15, 23, 42, 0.08);
        border: 1px solid rgba(148, 163, 184, 0.25);
    }
    .step-active { color: var(--accent); border-bottom: 3px solid var(--accent); font-weight: 700; }
    .btn-primary { background: var(--accent); color: white; }
    .hidden { display: none !important; }
  </style>
</head>
<body class="p-4">

  <div class="max-w-4xl mx-auto">
    <header class="flex justify-between items-center mb-6">
      <div>
        <h1 class="text-2xl font-black text-slate-900 tracking-tighter">ATIC | LOGÍSTICA</h1>
        <p class="text-slate-500 text-xs">Sistema de Coleta de Amostras</p>
      </div>
      <button id="logoutBtn" class="hidden bg-red-100 text-red-600 px-4 py-2 rounded-xl text-xs font-bold uppercase">Sair</button>
    </header>

    <div class="glass-card p-3 mb-6 flex justify-around text-[10px] font-bold uppercase text-slate-400">
        <span id="step1" class="pb-1">1. Login</span>
        <span id="step2" class="pb-1">2. OS</span>
        <span id="step3" class="pb-1">3. Amostras</span>
    </div>

    <div id="scanner-container" class="hidden mb-6">
        <div class="glass-card overflow-hidden border-2 border-indigo-500">
            <div id="reader" class="w-full bg-black"></div>
        </div>
        <button id="btnStopScan" class="w-full mt-3 bg-slate-800 text-white py-3 rounded-xl font-bold">FECHAR CÂMERA</button>
    </div>

    <div id="main-panel" class="space-y-4">
        <section id="section-login" class="hidden">
            <button onclick="startScanning('LOGIN')" class="btn-primary w-full py-10 rounded-3xl flex flex-col items-center">
                <span class="text-xl font-bold uppercase">Fazer Login</span>
                <span class="text-xs opacity-70 mt-1">Ler QR Code de Usuário</span>
            </button>
        </section>

        <section id="section-os" class="hidden space-y-4">
            <div class="glass-card p-4 text-sm font-bold text-slate-700">👤 Usuário: <span id="display-user"></span></div>
            <button onclick="startScanning('OS')" class="btn-primary w-full py-10 rounded-3xl font-bold uppercase">Ler QR Code da OS</button>
            <div class="flex gap-2">
                <input type="text" id="manualOS" placeholder="OS Manual" class="flex-1 p-3 rounded-xl border outline-none font-bold text-sm">
                <button onclick="confirmManualOS()" class="bg-slate-800 text-white px-4 rounded-xl font-bold text-xs uppercase">Ok</button>
            </div>
        </section>

        <section id="section-amostra" class="hidden space-y-4">
            <div class="flex gap-2">
                <div class="glass-card p-3 flex-1 text-xs font-bold">OS: <span id="display-os" class="text-indigo-600"></span></div>
                <button onclick="trocarOS()" class="bg-white border text-indigo-600 px-3 py-1 rounded-xl text-[10px] font-bold uppercase">Mudar OS</button>
            </div>
            <button onclick="startScanning('AMOSTRA')" class="btn-primary w-full py-14 rounded-3xl flex flex-col items-center">
                <span class="text-2xl font-black italic">COLETAR AMOSTRA</span>
                <span class="text-[10px] opacity-80 uppercase mt-1 tracking-widest">Leitura Barcode I25</span>
            </button>
        </section>
    </div>

    <section class="glass-card mt-8 overflow-hidden">
        <div class="p-3 bg-slate-50 border-b flex justify-between items-center">
            <h2 class="text-[10px] font-black uppercase text-slate-500">Registros Coletados</h2>
            <button onclick="exportarDados()" class="text-[10px] bg-indigo-600 text-white px-3 py-1 rounded font-bold uppercase">Exportar</button>
        </div>
        <div class="overflow-x-auto">
            <table class="w-full text-left text-xs">
                <thead>
                    <tr class="bg-slate-50 text-slate-400 font-bold border-b">
                        <th class="p-3">Amostra</th>
                        <th class="p-3">Data/Hora</th>
                        <th class="p-3">Ação</th>
                    </tr>
                </thead>
                <tbody id="logTable" class="divide-y"></tbody>
            </table>
        </div>
    </section>

    <div id="splash" class="hidden fixed inset-0 flex items-center justify-center bg-indigo-600/90 backdrop-blur-sm z-50 text-white">
        <div class="text-center">
            <div class="text-5xl font-bold mb-2">✓</div>
            <div class="text-sm font-bold uppercase tracking-widest">Registrado</div>
        </div>
    </div>
  </div>

  <script>
    let appState = {
        user: JSON.parse(localStorage.getItem('atic_user')) || null,
        os: null,
        logs: JSON.parse(localStorage.getItem('atic_logs')) || []
    };

    // Configuração otimizada para Barcode I25 e QR Code
    const html5QrCode = new Html5Qrcode("reader");
    const scanConfig = { 
        fps: 20, // Aumentado para resposta mais rápida
        qrbox: { width: 280, height: 180 }, // Box retangular para facilitar barcode
        aspectRatio: 1.0,
        formatsToSupport: [ 
            Html5QrcodeSupportedFormats.QR_CODE, 
            Html5QrcodeSupportedFormats.ITF // Foco no Interleaved 2 of 5
        ]
    };

    function updateUI() {
        document.getElementById('section-login').classList.add('hidden');
        document.getElementById('section-os').classList.add('hidden');
        document.getElementById('section-amostra').classList.add('hidden');
        document.getElementById('logoutBtn').classList.add('hidden');
        document.querySelectorAll('[id^="step"]').forEach(s => s.classList.remove('step-active'));

        if (!appState.user) {
            document.getElementById('section-login').classList.remove('hidden');
            document.getElementById('step1').classList.add('step-active');
        } else if (!appState.os) {
            document.getElementById('section-os').classList.remove('hidden');
            document.getElementById('logoutBtn').classList.remove('hidden');
            document.getElementById('display-user').innerText = appState.user.nome;
            document.getElementById('step2').classList.add('step-active');
        } else {
            document.getElementById('section-amostra').classList.remove('hidden');
            document.getElementById('logoutBtn').classList.remove('hidden');
            document.getElementById('display-os').innerText = appState.os;
            document.getElementById('step3').classList.add('step-active');
        }
        renderLogs();
    }

    async function startScanning(type) {
        document.getElementById('main-panel').classList.add('hidden');
        document.getElementById('scanner-container').classList.remove('hidden');
        
        // Inicia a câmera (pedirá permissão apenas na 1ª vez se o domínio for HTTPS)
        try {
            await html5QrCode.start({ facingMode: "environment" }, scanConfig, (text) => {
                processData(type, text);
            });
        } catch (err) {
            alert("Câmera já em uso ou permissão negada.");
            stopScanning();
        }
    }

    function stopScanning() {
        if (html5QrCode.getState() !== 1) { // 1 = NOT_STARTED
            html5QrCode.stop().then(() => {
                document.getElementById('scanner-container').classList.add('hidden');
                document.getElementById('main-panel').classList.remove('hidden');
            });
        }
    }

    function processData(type, data) {
        // Para evitar múltiplas leituras do mesmo código no mesmo segundo
        if (this.isProcessing) return;
        this.isProcessing = true;
        setTimeout(() => this.isProcessing = false, 2000);

        if (type === 'LOGIN') {
            const parts = data.split(';');
            if (parts.length >= 2) {
                appState.user = { nome: parts[0], id: parts[1] };
                localStorage.setItem('atic_user', JSON.stringify(appState.user));
                triggerSuccess();
                stopScanning();
            }
        } else if (type === 'OS') {
            const regex = /^[A-Z]{3}\d{5}\/\d{4}(#[A-Z])?$/;
            if (regex.test(data.trim().toUpperCase())) {
                appState.os = data.trim().toUpperCase();
                triggerSuccess();
                stopScanning();
            }
        } else if (type === 'AMOSTRA') {
            // Validar Duplicidade
            const existe = appState.logs.find(l => l.amostra === data && l.os === appState.os);
            if (existe) {
                alert("Amostra já coletada!");
                return;
            }

            if (/^\d+$/.test(data)) {
                appState.logs.push({
                    id: Date.now(), // ID único para deleção
                    os: appState.os,
                    amostra: data,
                    usuario: appState.user.nome,
                    dataHora: new Date().toLocaleString('pt-BR')
                });
                localStorage.setItem('atic_logs', JSON.stringify(appState.logs));
                triggerSuccess();
                // Não para o scanner aqui para permitir coletas sequenciais rápidas
            }
        }
        updateUI();
    }

    function deleteLog(id) {
        if(confirm("Deseja excluir esta amostra?")) {
            appState.logs = appState.logs.filter(l => l.id !== id);
            localStorage.setItem('atic_logs', JSON.stringify(appState.logs));
            updateUI();
        }
    }

    function renderLogs() {
        const container = document.getElementById('logTable');
        container.innerHTML = appState.logs.slice().reverse().map(l => `
            <tr class="hover:bg-slate-50 transition">
                <td class="p-3 font-bold text-indigo-600">${l.amostra}</td>
                <td class="p-3 text-slate-500">${l.dataHora}</td>
                <td class="p-3">
                    <button onclick="deleteLog(${l.id})" class="text-red-500 font-bold">EXCLUIR</button>
                </td>
            </tr>
        `).join('');
    }

    function triggerSuccess() {
        const splash = document.getElementById('splash');
        splash.classList.remove('hidden');
        setTimeout(() => splash.classList.add('hidden'), 800);
    }

    function trocarOS() { appState.os = null; updateUI(); }
    
    function confirmManualOS() { 
        processData('OS', document.getElementById('manualOS').value); 
        document.getElementById('manualOS').value = "";
    }

    document.getElementById('logoutBtn').addEventListener('click', () => {
        localStorage.removeItem('atic_user');
        appState.user = null; appState.os = null; updateUI();
    });

    document.getElementById('btnStopScan').addEventListener('click', stopScanning);

    updateUI();
  </script>
</body>
</html>
